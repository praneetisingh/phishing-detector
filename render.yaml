services:
  # ---------------------------------------------------------
  # 1. The Backend API Service (FastAPI)
  # ---------------------------------------------------------
  - type: web
    name: phishing-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Overriding the start CMD to bind to Render's dynamic $PORT properly via shell
    dockerCommand: "bash -c 'uvicorn api.main:app --host 0.0.0.0 --port $PORT'"
    plan: free # Adjust if memory limits are hit (Free tier gives 512MB RAM)
    healthCheckPath: /health

  # ---------------------------------------------------------
  # 2. The Frontend Client Service (Streamlit)
  # ---------------------------------------------------------
  - type: web
    name: phishing-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Starts the Streamlit application and binds it to Render's dynamic $PORT safely via shell
    dockerCommand: "bash -c 'streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0'"
    plan: free
    envVars:
      # Automatically links the frontend to the deployed backend url!
      - key: API_BASE
        fromService:
          name: phishing-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
